server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: office-supply-management-system
  profiles:
    active: dev

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/office_supply_ms?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 连接池配置
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      # 检测需要关闭的空闲连接
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 打开PSCache，并且指定每个连接上PSCache的大小
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters
      filters: stat,wall
      # 合并多个DruidDataSource的监控数据
      use-global-data-source-stat: true

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  # Quartz配置
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always #更改never
      data-source: dataSource
    properties:
      org:
        quartz:
          scheduler:
            instanceName: OfficeSupplyScheduler
            instanceId: AUTO
          jobStore:
#            class: org.quartz.impl.jdbcjobstore.JobStoreTX
#            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            tablePrefix: QRTZ_
            isClustered: false # 如果只有一个实例，设为 false；若多节点则 true
            clusterCheckinInterval: 10000
            useProperties: false
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5
            threadsInheritContextClassLoaderOfInitializingThread: true

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# 应用自定义配置
app:
  jwt:
    secret: office-supply-management-system-secret-key-2026
    expiration: 86400000 # 24小时
    header: Authorization

  # 文件上传路径
  upload:
    path: ./upload/

  # 分页配置
  page:
    size: 10

  # 算法配置
  algorithm:
    # ABC分类阈值
    abc-class-a-percent: 0.7
    abc-class-b-percent: 0.2
    abc-class-c-percent: 0.1
    # 移动平均法默认周期
    moving-average-period: 3
    # 异常检测标准差倍数
    abnormal-sigma-multiple: 3
    # 安全系数默认值
    default-safety-factor: 1.5

  # 定时任务配置
  schedule:
    # ABC分类计算 cron表达式：每天凌晨2点执行
    abc-class-cron: 0 0 2 * * ?
    # 补货点计算 cron表达式：每小时执行一次
    reorder-point-cron: 0 0 * * * ?
    # 需求预测 cron表达式：每月1号凌晨3点执行
    demand-forecast-cron: 0 0 3 1 * ?

# 日志配置
logging:
  level:
    com.officesupplyms: DEBUG
    org.springframework.web: INFO
    org.mybatis: INFO
  file:
    name: logs/office-supply-ms.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"